version: '3.8'

services:
    postgres:
        image: postgres:15-alpine
        environment:
            POSTGRES_DB: productdb
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    api:
        build:
            context: .
            dockerfile: Dockerfile.api
        environment:
            - DB_CONNECTION_STRING=Host=postgres;Database=productdb;Username=postgres;Password=postgres
        ports:
            - "5000:8080"
        depends_on:
            - postgres

volumes:
    postgres_data:

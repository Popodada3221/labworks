version: '3.8'

services:
    postgres:
        image: postgres:15-alpine
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - prod_network
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
            interval: 10s
            timeout: 5s
            retries: 5

    api:
        build:
            context: .
            dockerfile: Dockerfile
        environment:
            - DB_CONNECTION_STRING=Host=postgres;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
        networks:
            - prod_network
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
            interval: 30s
            timeout: 10s
            retries: 3
        deploy:
            replicas: 3
            restart_policy:
                condition: on-failure
            update_config:
                parallelism: 1
                delay: 10s

    nginx:
        image: nginx:alpine
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        networks:
            - prod_network
        depends_on:
            - api

networks:
    prod_network:
        driver: overlay

volumes:
    postgres_data:

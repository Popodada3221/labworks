name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'src/Api/Api.csproj'
  TEST_PROJECT_PATH: 'tests/Api.Tests/Api.Tests.csproj'

jobs:
  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} --no-build --configuration Release --verbosity normal

  build-and-push:
    name: 🐳 Build and push Docker image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lab-api:latest
            ${{ secrets.DOCKER_USERNAME }}/lab-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-on-local-linux:
    name: Deploy to local Linux device
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Update compose files from repo
        run: |
          cd /home/d/labworks   # папка, где лежит копия репозитория
          git pull origin main                 # скачиваем последние изменения (включая docker-compose-lb.yml)

      - name: Pull latest images and restart containers
        run: |
          cd /home/d/labworks
          docker compose -f docker-compose-lb.yml pull
          docker compose -f docker-compose-lb.yml up -d --remove-orphans
          docker system prune -f
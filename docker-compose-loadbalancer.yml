version: '3.8'

services:
    nginx-lb:
        image: nginx:alpine
        container_name: nginx_load_balancer
        ports:
            - "8080:80"
        volumes:
            - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - api1
            - api2
            - api3
        networks:
            - lb_network

    api1:
        build:
            context: .
            dockerfile: Dockerfile.api
        environment:
            - DB_CONNECTION_STRING=Host=postgres;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
            - HOSTNAME=api-node-1
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - lb_network
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
            interval: 30s
            timeout: 10s
            retries: 3

    api2:
        build:
            context: .
            dockerfile: Dockerfile.api
        environment:
            - DB_CONNECTION_STRING=Host=postgres;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
            - HOSTNAME=api-node-2
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - lb_network
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
            interval: 30s
            timeout: 10s
            retries: 3

    api3:
        build:
            context: .
            dockerfile: Dockerfile.api
        environment:
            - DB_CONNECTION_STRING=Host=postgres;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
            - HOSTNAME=api-node-3
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - lb_network
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
            interval: 30s
            timeout: 10s
            retries: 3

    postgres:
        image: postgres:15-alpine
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - lb_network
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    lb_network:
        driver: bridge

volumes:
    postgres_data:
